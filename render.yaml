services:
  - type: web
    name: project-storage-tracker-api
    runtime: node
    plan: free
    buildCommand: "cd backend && npm install && npx prisma generate && npx prisma db push"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString

databases:
  - name: postgres
    plan: free
